name: matts-second-brain-docs
services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matts-second-brain-docs
    restart: unless-stopped
    ports:
      - "127.0.0.1:4324:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
          pids: 200
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /var/tmp:rw,noexec,nosuid,nodev,size=16m
      - /dev/shm:rw,noexec,nosuid,nodev,size=16m
      - /var/cache/nginx:rw,noexec,nosuid,nodev,size=32m
      - /run:rw,noexec,nosuid,nodev,size=8m
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
